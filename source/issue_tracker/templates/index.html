{% extends 'base.html' %}

{% block nav %}
  <a href="{% url 'create' %}" class="btn btn-primary">
    Add Task
  </a>
{% endblock %}

{% block content %}
  {% if error %}
    <div class="alert alert-danger">
      {{ error }}
    </div>
  {% endif %}

  <div class="row g-3">
    {% for task in tasks %}
    <div class="col-12 col-md-12 col-lg-6">

      <div class="card mb-3 border border-2 border-dark rounded-3 h-100">
        <div class="card-body p-3">

          <div class="d-flex justify-content-between align-items-start gap-3">
            <h5 class="card-title mb-3">
              {{ task.summary }}
              <span class="text-muted">
                ({{ task.status }})
              </span>
            </h5>

            <div class="d-flex gap-2 fs-4 flex-shrink-0">
              <a href="{% url 'detail' task.pk %}" class="text-dark text-decoration-none">
                <i class="bi bi-info-square"></i>
              </a>

              <a href="{% url 'update' task.pk %}" class="text-dark text-decoration-none">
                <i class="bi bi-pencil-square"></i>
              </a>

              <a href="#" class="text-dark text-decoration-none" data-bs-toggle="modal" data-bs-target="#task-{{ message.pk }}-Modal">
                <i class="bi bi-x-square"></i>
              </a>
            </div>
          </div>

          <p class="card-text mb-0">
            {{ task.description }}
          </p>

        </div>
      </div>
    </div>
    {% empty %}
      <p class="text-muted">No active messages yet.</p>
    {% endfor %}
  </div>
{% endblock %}
