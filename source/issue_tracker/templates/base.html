<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guest Book</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>
        <a href="{% url 'project-list' %}" class="text-decoration-none text-dark">All Projects</a>
      </h1>

      <div class="d-flex align-items-center gap-3">
        {% if user.is_authenticated %}
          <span class="text-muted">{{ user.username }}</span>
          <a href="{% url 'logout' %}" class="btn btn-outline-secondary btn-sm">Log out</a>
        {% else %}
          <a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm">Log in</a>
        {% endif %}

        {% block nav %}
        {% endblock %}
      </div>
    </div>

    {% block content %}
    {% endblock %}

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
